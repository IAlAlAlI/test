<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动问答</title>
    <style>
        body {
            background: url('path_to_aged_paper_texture.jpg');
            color: #000;
            font-family: 'SimHei', serif;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 48px;
            color: #DC143C;
            border: 4px solid #000;
            padding: 10px;
            margin: 20px 0;
        }
        button {
            font-size: 24px;
            padding: 10px 20px;
            border: 2px solid #000;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .yes {
            background-color: #DC143C;
            color: white;
        }
        .no {
            background-color: #FFD700;
            color: black;
        }
        .yes:hover {
            background-color: #FFD700;
            color: black;
        }
        .no:hover {
            background-color: #DC143C;
            color: white;
        }
        .border {
            border: 4px solid #000;
            padding: 10px;
            margin: 20px;
        }
        .star {
            color: #FFD700;
            font-size: 30px;
        }
    </style>
</head>
<body>
    <h1>欢迎参与互动问答</h1>
    <div class="border">
        <div class="star">★ ★ ★ ★ ★</div>
        <p>你觉得这个问题是什么?</p>
        <button class="yes" onclick="swapColors('yes')">是</button>
        <button class="no" onclick="swapColors('no')">不是</button>
        <div class="star">★ ★ ★ ★ ★</div>
    </div>
    <script>
        function swapColors(answer) {
            if (answer === 'yes') {
                alert('你选择了是!');
            } else {
                alert('你选择了不是!');
            }
        }
    </script>
</body>
</html>
